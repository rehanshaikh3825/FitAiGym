# Render Blueprint – Infrastructure as Code
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: fitai-gym
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn fitai_gym.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        value: "media"
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: "gemini-2.5-flash"
      - key: EXERCISE_API_KEY
        sync: false
      - key: DIET_API_KEY
        sync: false
